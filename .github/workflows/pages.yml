name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check Pages status
        id: pages
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const page = await github.rest.repos.getPages({
                owner: context.repo.owner,
                repo: context.repo.repo,
              });
              core.setOutput('enabled', 'true');
              core.setOutput('page_url', page.data.html_url || '');
              await core.summary
                .addHeading('GitHub Pages enabled')
                .addRaw(`Pages site: ${page.data.html_url || 'configured'}`)
                .write();
            } catch (error) {
              if (error.status === 404) {
                core.setOutput('enabled', 'false');
                await core.summary
                  .addHeading('GitHub Pages not enabled yet')
                  .addRaw('Open Settings > Pages and choose GitHub Actions, then rerun this workflow.')
                  .write();
              } else {
                throw error;
              }
            }

      - name: Configure Pages
        if: steps.pages.outputs.enabled == 'true'
        uses: actions/configure-pages@v5

      - name: Upload artifact
        if: steps.pages.outputs.enabled == 'true'
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./docs

      - name: Deploy to GitHub Pages
        if: steps.pages.outputs.enabled == 'true'
        id: deployment
        uses: actions/deploy-pages@v4
